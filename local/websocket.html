<!DOCTYPE html>
<html>
<body>
<script>
  let ws = new WebSocket("ws://localhost:8000/ws");

  ws.onopen = () => {
    console.log("connected");
    ws.send("hello");
  };

  ws.onmessage = (e) => {
    console.log("received:", e.data);
  };

  ws.onerror = (e) => {
    console.log("error:", e);
  };

  ws.onclose = () => {
    console.log("closed");
  };
</script>
</body>
</html>
